name: Keep Vercel Warm

on:
  schedule:
    # Ping every 5 minutes to prevent serverless cold starts
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app to keep warm
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_APP_URL }}" ]; then
            echo "NEXT_PUBLIC_APP_URL secret not set — skipping."
            exit 0
          fi
          echo "Pinging ${{ secrets.NEXT_PUBLIC_APP_URL }}/api/ping ..."
          curl -sf -o /dev/null "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/ping" && echo "✅ OK" || echo "⚠️ Ping failed (non-fatal)"
